name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers deployment only when code is pushed to the 'main' branch

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'  # Adjust based on the Node.js version you're using

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build  # This will create the build output in 'dist/'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # Deploy only when pushing to the 'main' branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Uses GitHub's token for authentication
          publish_dir: ./dist  # Directory where the build output is stored
          publish_branch: gh-pages  # The branch where GitHub Pages is served from (default is gh-pages)
